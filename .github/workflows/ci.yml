name: Pro-CI-Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci # Faster and more reliable in CI
        
      - name: Type Check
        run: npx tsc --noEmit
        
      - name: Lint Check
        run: npm run lint
        
      - name: Production Build Check
        run: npm run build